<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Aulinor</title>
  <meta name="description" content="Aulinor — hardened and controllable AI models for high-stakes, high-compliance environments.">
  <meta property="og:title" content="Aulinor">
  <meta property="og:description" content="Hardened and controllable AI models for high-stakes, high-compliance environments.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://aulinor.com">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --charcoal: #1C2430;
      --cream: #F4F1EA;
      --gold: #C9A227;
      --muted: #9AA0AA;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      background: var(--charcoal);
      color: var(--cream);
      font-family: 'Inter', -apple-system, 'Helvetica Neue', Arial, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
    }
    main { padding: 2rem; }
    h1 {
      font-size: clamp(2.2rem, 8vw, 4.5rem);
      font-weight: 600;
      letter-spacing: 0.28em;
      margin-right: -0.28em; /* visually re-center the tracked text */
      white-space: nowrap;
    }
    h1 .au { color: var(--gold); }
    .rule {
      width: 5.5rem;
      height: 2px;
      background: var(--gold);
      margin: 1.75rem auto;
      border: 0;
    }
    p {
      color: var(--muted);
      font-size: clamp(0.95rem, 2.5vw, 1.15rem);
      font-weight: 400;
      letter-spacing: 0.04em;
      line-height: 1.6;
      max-width: 34rem;
      margin: 0 auto;
    }
  </style>
</head>
<body>
  <main>
    <h1><span class="au">AU</span>LINOR</h1>
    <hr class="rule">
    <p>Hardened and controllable AI models for high&#8209;stakes, high&#8209;compliance environments.</p>
  </main>
</body>
</html>
